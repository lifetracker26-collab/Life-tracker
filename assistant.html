<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E9EE0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Life Tracker · Asistente IA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#2E9EE0;--b2:#1470A8;--sky:#EAF5FF;--t:#0D2137;--tl:#7A9AB8;--gr:#2EAF7D;--pk:#E8547A;--g2:linear-gradient(135deg,#2E9EE0,#1470A8)}
body{font-family:'DM Sans',sans-serif;background:#f0f7ff;color:var(--t)}
.app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
.header{background:#fff;padding:50px 20px 14px;border-bottom:1px solid rgba(46,158,224,0.1);flex-shrink:0}
.hrow{display:flex;align-items:center;gap:12px}
.ai-av{width:44px;height:44px;background:var(--g2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.ai-info{flex:1}
.ai-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}
.ai-status{font-size:.6rem;color:var(--gr);font-weight:600}
.clear-btn{background:var(--sky);border:1px solid rgba(46,158,224,0.2);border-radius:10px;padding:6px 12px;font-size:.62rem;font-weight:600;color:var(--b2);cursor:pointer;font-family:'DM Sans',sans-serif}
.sugs{padding:10px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.sugs::-webkit-scrollbar{display:none}
.sug{background:#fff;border:1px solid rgba(46,158,224,0.2);border-radius:20px;padding:7px 14px;font-size:.62rem;font-weight:600;color:var(--b2);white-space:nowrap;cursor:pointer;flex-shrink:0}
.chat{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.chat::-webkit-scrollbar{display:none}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.user{flex-direction:row-reverse}
.bubble{max-width:78%;padding:10px 13px;border-radius:18px;font-size:.73rem;line-height:1.55}
.msg.ai .bubble{background:#fff;color:var(--t);border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(46,158,224,0.08);border:1px solid rgba(46,158,224,0.08)}
.msg.user .bubble{background:var(--g2);color:#fff;border-bottom-right-radius:4px}
.msg-av{width:26px;height:26px;border-radius:50%;background:var(--g2);display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.typing{display:flex;gap:3px;padding:10px 13px;background:#fff;border-radius:18px;border-bottom-left-radius:4px;width:fit-content;box-shadow:0 2px 8px rgba(46,158,224,0.08)}
.typing span{width:5px;height:5px;background:var(--tl);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.input-bar{background:#fff;border-top:1px solid rgba(46,158,224,0.08);padding:10px 14px 28px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.input-field{flex:1;background:var(--sky);border:1.5px solid transparent;border-radius:22px;padding:10px 16px;font-size:.75rem;color:var(--t);font-family:'DM Sans',sans-serif;outline:none;resize:none;max-height:100px;line-height:1.4;-webkit-appearance:none}
.input-field:focus{border-color:var(--b);background:#fff}
.mic-btn{width:40px;height:40px;background:var(--sky);border:1.5px solid rgba(46,158,224,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;flex-shrink:0}
.mic-btn.listening{background:var(--pk);border-color:var(--pk)}
.send-btn{width:40px;height:40px;background:var(--g2);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;flex-shrink:0;color:#fff}
.send-btn:disabled{opacity:.5}
.action-card{background:#fff;border:1.5px solid rgba(46,158,224,0.2);border-radius:14px;padding:12px;margin-top:6px;font-size:.7rem}
.action-card .action-title{font-weight:700;color:var(--b2);margin-bottom:4px}
.action-card .action-body{color:var(--t);line-height:1.5}
.action-card .action-confirm{display:flex;gap:8px;margin-top:10px}
.action-card .action-confirm button{flex:1;padding:8px;border:none;border-radius:10px;font-size:.65rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.action-card .btn-yes{background:var(--g2);color:#fff}
.action-card .btn-no{background:var(--sky);color:var(--b2)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="hrow">
      <div class="ai-av">✨</div>
      <div class="ai-info">
        <div class="ai-name">Life AI</div>
        <div class="ai-status" id="ai-status">En línea</div>
      </div>
      <button class="clear-btn" id="btn-clear">Limpiar</button>
    </div>
  </div>
  <div class="sugs" id="sugs-row">
    <div class="sug" data-text="¿Qué tengo hoy?">📋 ¿Qué tengo hoy?</div>
    <div class="sug" data-text="Agrega una tarea para hoy">✅ Nueva tarea</div>
    <div class="sug" data-text="Crea un evento para mañana">📅 Nuevo evento</div>
    <div class="sug" data-text="¿Cómo voy con mis hábitos?">🔥 Mis hábitos</div>
    <div class="sug" data-text="Anota algo importante">📝 Nueva nota</div>
    <div class="sug" data-text="Registra un gasto">💰 Registrar gasto</div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-bar">
    <textarea class="input-field" id="msg-input" placeholder="Escribe o usa el micrófono..." rows="1"></textarea>
    <div class="mic-btn" id="mic-btn">🎙️</div>
    <button class="send-btn" id="send-btn" disabled>➤</button>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import{getFirestore,collection,getDocs,addDoc,updateDoc,doc,query,where,serverTimestamp,Timestamp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyB1SG1XpJh8yeH-Ub4sMfWN5NpYkCHhTNM",authDomain:"lifetracker26-30037.firebaseapp.com",projectId:"lifetracker26-30037",storageBucket:"lifetracker26-30037.firebasestorage.app",messagingSenderId:"375272536562",appId:"1:375272536562:web:33cfead324a6e3a049136b"});
const auth=getAuth(app),db=getFirestore(app);

function localDateStr(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}

let uid=null,userName='',messages=[],isListening=false,recognition=null,sysPrompt='';
const today=localDateStr(new Date());

// Datos en memoria para contexto
let myTasks=[],myHabits=[],myEvents=[],myNotes=[],myGoals=[],myTxs=[];

addMsg('Hola 👋 Soy tu asistente personal. Puedo crear eventos, tareas, hábitos, notas, metas y registrar gastos. ¿En qué te ayudo?','ai',true);

const inp=document.getElementById('msg-input');
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';document.getElementById('send-btn').disabled=!inp.value.trim();});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
document.getElementById('send-btn').addEventListener('click',sendMsg);

document.getElementById('sugs-row').addEventListener('click',e=>{
  const sug=e.target.closest('.sug');if(!sug)return;
  sendText(sug.dataset.text);
});

document.getElementById('btn-clear').addEventListener('click',()=>{
  messages=[];document.getElementById('chat').innerHTML='';
  addMsg('Chat limpiado. ¿En qué te ayudo? 😊','ai',true);
});

// Micrófono
document.getElementById('mic-btn').addEventListener('click',()=>{
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){alert('Tu navegador no soporta voz.');return;}
  if(isListening){if(recognition)recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='es-MX';recognition.interimResults=false;
  recognition.onstart=()=>{isListening=true;document.getElementById('mic-btn').classList.add('listening');document.getElementById('ai-status').textContent='Escuchando...';};
  recognition.onresult=e=>{inp.value=e.results[0][0].transcript;document.getElementById('send-btn').disabled=false;stopListening();sendMsg();};
  recognition.onerror=()=>stopListening();
  recognition.onend=()=>stopListening();
  recognition.start();
});

function stopListening(){isListening=false;document.getElementById('mic-btn').classList.remove('listening');document.getElementById('ai-status').textContent='En línea';}

onAuthStateChanged(auth,async user=>{
  if(!user){location.href='index.html';return;}
  uid=user.uid;
  userName=(user.displayName||user.email||'').split(' ')[0];
  await loadAllData();
  buildSysPrompt();
});

async function loadAllData(){
  try{
    // Tareas de hoy
    const tsnap=await getDocs(query(collection(db,'tasks'),where('uid','==',uid),where('date','==',today)));
    myTasks=[];tsnap.forEach(d=>myTasks.push({id:d.id,...d.data()}));
    // Hábitos
    const hsnap=await getDocs(query(collection(db,'habits'),where('uid','==',uid)));
    myHabits=[];hsnap.forEach(d=>myHabits.push({id:d.id,...d.data()}));
    // Eventos de hoy y mañana
    const tomorrow=localDateStr(new Date(Date.now()+86400000));
    const esnap=await getDocs(query(collection(db,'events'),where('uid','==',uid)));
    myEvents=[];esnap.forEach(d=>myEvents.push({id:d.id,...d.data()}));
    // Notas recientes
    const nsnap=await getDocs(query(collection(db,'quick_notes'),where('uid','==',uid)));
    myNotes=[];nsnap.forEach(d=>myNotes.push({id:d.id,...d.data()}));
    // Metas
    const gsnap=await getDocs(query(collection(db,'goals'),where('uid','==',uid)));
    myGoals=[];gsnap.forEach(d=>myGoals.push({id:d.id,...d.data()}));
    // Transacciones recientes
    const txsnap=await getDocs(query(collection(db,'transactions'),where('uid','==',uid)));
    myTxs=[];txsnap.forEach(d=>myTxs.push({id:d.id,...d.data()}));
  }catch(e){console.error('Error cargando datos:',e);}
}

function buildSysPrompt(){
  const tareasPendientes=myTasks.filter(t=>!t.done).map(t=>t.text).join(', ')||'ninguna';
  const tareasHechas=myTasks.filter(t=>t.done).map(t=>t.text).join(', ')||'ninguna';
  const habitos=myHabits.map(h=>`${h.name} (racha: ${h.streak||0} días, hoy: ${(h.completedDates||[]).includes(today)?'✓':'✗'})`).join(', ')||'ninguno';
  const eventosHoy=myEvents.filter(e=>e.date===today).map(e=>`${e.time||''} ${e.title}`).join(', ')||'ninguno';
  const metas=myGoals.map(g=>`${g.emoji||''} ${g.name} (${g.progress||0}%)`).join(', ')||'ninguna';
  
  sysPrompt=`Eres Life AI, el asistente personal inteligente de Life Tracker para ${userName}. 
Fecha de hoy: ${today} (${new Date().toLocaleDateString('es-MX',{weekday:'long'})}).

DATOS ACTUALES DEL USUARIO:
- Tareas pendientes hoy: ${tareasPendientes}
- Tareas completadas hoy: ${tareasHechas}
- Hábitos: ${habitos}
- Eventos de hoy: ${eventosHoy}
- Metas activas: ${metas}

CAPACIDADES - Puedes ejecutar estas acciones respondiendo con JSON estructurado:

1. CREAR TAREA: {"action":"create_task","text":"texto de la tarea","date":"YYYY-MM-DD"}
2. CREAR EVENTO: {"action":"create_event","title":"título","date":"YYYY-MM-DD","time":"HH:MM","note":"nota opcional"}
3. CREAR HÁBITO: {"action":"create_habit","name":"nombre del hábito"}
4. CREAR NOTA: {"action":"create_note","title":"título","content":"contenido"}
5. CREAR META: {"action":"create_goal","name":"nombre","emoji":"🎯","progress":0}
6. REGISTRAR GASTO: {"action":"create_transaction","type":"gasto","description":"descripción","amount":0,"category":"categoría"}
7. REGISTRAR INGRESO: {"action":"create_transaction","type":"ingreso","description":"descripción","amount":0,"category":"categoría"}
8. MARCAR TAREA HECHA: {"action":"complete_task","taskId":"id de la tarea"}
9. MARCAR HÁBITO HECHO: {"action":"complete_habit","habitId":"id del hábito"}
10. SOLO RESPONDER: {"action":"reply","message":"tu respuesta"}

IDs de tareas de hoy: ${myTasks.map(t=>`${t.text}→${t.id}`).join(', ')||'ninguna'}
IDs de hábitos: ${myHabits.map(h=>`${h.name}→${h.id}`).join(', ')||'ninguno'}

REGLAS:
- Siempre responde con JSON válido
- Si el usuario pide crear algo, ejecuta la acción y confirma
- Si faltan datos (como fecha u hora), usa hoy o pregunta
- Sé cálido, conciso y en español
- Para acciones, incluye también un campo "message" con tu respuesta al usuario
- Si el usuario saluda o hace preguntas generales, usa action:"reply"
- Para fechas relativas: "mañana"=${localDateStr(new Date(Date.now()+86400000))}, "hoy"=${today}
- Moneda del usuario: MXN`;
}

function addMsg(text,role,skipHistory=false){
  if(!skipHistory) messages.push({role:role==='ai'?'assistant':'user',content:text});
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  if(role==='ai') div.innerHTML=`<div class="msg-av">✨</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  else div.innerHTML=`<div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function showActionCard(actionData,message){
  const chat=document.getElementById('chat');
  const card=document.createElement('div');
  card.className='msg ai';
  
  let preview='';
  switch(actionData.action){
    case 'create_task': preview=`✅ Crear tarea: "<b>${actionData.text}</b>" para el ${actionData.date}`; break;
    case 'create_event': preview=`📅 Crear evento: "<b>${actionData.title}</b>" el ${actionData.date}${actionData.time?' a las '+actionData.time:''}`; break;
    case 'create_habit': preview=`🔥 Crear hábito: "<b>${actionData.name}</b>"`; break;
    case 'create_note': preview=`📝 Crear nota: "<b>${actionData.title}</b>"`; break;
    case 'create_goal': preview=`🎯 Crear meta: "${actionData.emoji||''}  <b>${actionData.name}</b>"`; break;
    case 'create_transaction': preview=`💰 Registrar ${actionData.type}: "<b>${actionData.description}</b>" $${actionData.amount}`; break;
    case 'complete_task': preview=`✓ Marcar tarea como hecha`; break;
    case 'complete_habit': preview=`✓ Marcar hábito como hecho hoy`; break;
  }

  card.innerHTML=`<div class="msg-av">✨</div><div style="flex:1"><div class="bubble">${message}</div><div class="action-card"><div class="action-title">¿Confirmar acción?</div><div class="action-body">${preview}</div><div class="action-confirm"><button class="btn-yes">✓ Sí, hacerlo</button><button class="btn-no">✗ No</button></div></div></div>`;
  chat.appendChild(card);
  chat.scrollTop=chat.scrollHeight;

  card.querySelector('.btn-yes').addEventListener('click',async()=>{
    card.querySelector('.action-confirm').innerHTML='<span style="color:var(--tl);font-size:.65rem">Ejecutando...</span>';
    await executeAction(actionData);
    card.querySelector('.action-confirm').innerHTML='<span style="color:var(--gr);font-size:.65rem">✓ ¡Listo!</span>';
  });
  card.querySelector('.btn-no').addEventListener('click',()=>{
    card.querySelector('.action-confirm').innerHTML='<span style="color:var(--tl);font-size:.65rem">Cancelado.</span>';
  });
}

async function executeAction(a){
  try{
    switch(a.action){
      case 'create_task':
        await addDoc(collection(db,'tasks'),{uid,text:a.text,date:a.date||today,done:false,createdAt:serverTimestamp()});
        break;
      case 'create_event':
        const hour=a.time?parseInt(a.time.split(':')[0]):null;
        await addDoc(collection(db,'events'),{uid,title:a.title,note:a.note||'',date:a.date||today,time:a.time||null,hour,color:'#2E9EE0',alarms:[],repeat:null,repeatCustom:null,createdAt:serverTimestamp()});
        break;
      case 'create_habit':
        // Buscar primer grupo disponible o crear sin grupo
        const gsnap=await getDocs(query(collection(db,'habit_groups'),where('uid','==',uid)));
        let groupId=null;
        gsnap.forEach(d=>{if(!groupId)groupId=d.id;});
        if(!groupId){
          const gref=await addDoc(collection(db,'habit_groups'),{uid,name:'Mis hábitos',color:'#2E9EE0',createdAt:serverTimestamp()});
          groupId=gref.id;
        }
        await addDoc(collection(db,'habits'),{uid,name:a.name,groupId,completedDates:[],streak:0,createdAt:serverTimestamp()});
        break;
      case 'create_note':
        await addDoc(collection(db,'quick_notes'),{uid,title:a.title,content:a.content||'',color:'#fff',createdAt:serverTimestamp()});
        break;
      case 'create_goal':
        await addDoc(collection(db,'goals'),{uid,name:a.name,emoji:a.emoji||'🎯',progress:a.progress||0,createdAt:serverTimestamp()});
        break;
      case 'create_transaction':
        await addDoc(collection(db,'transactions'),{uid,type:a.type,description:a.description,amount:parseFloat(a.amount)||0,date:today,category:a.category||null,createdAt:serverTimestamp()});
        break;
      case 'complete_task':
        if(a.taskId) await updateDoc(doc(db,'tasks',a.taskId),{done:true,doneAt:serverTimestamp()});
        break;
      case 'complete_habit':
        if(a.habitId){
          const h=myHabits.find(h=>h.id===a.habitId);
          if(h){
            const dates=[...(h.completedDates||[])];
            if(!dates.includes(today)){dates.push(today);}
            await updateDoc(doc(db,'habits',a.habitId),{completedDates:dates,updatedAt:serverTimestamp()});
          }
        }
        break;
    }
    await loadAllData();
    buildSysPrompt();
  }catch(e){console.error('Error ejecutando acción:',e);}
}

function sendMsg(){
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  document.getElementById('send-btn').disabled=true;
  sendText(text);
}

async function sendText(text){
  addMsg(text,'user');
  document.getElementById('ai-status').textContent='Pensando...';
  const chat=document.getElementById('chat');
  const typing=document.createElement('div');
  typing.className='msg ai';typing.id='typing';
  typing.innerHTML='<div class="msg-av">✨</div><div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(typing);chat.scrollTop=chat.scrollHeight;

  try{
    const history=messages.slice(-10).map(m=>({role:m.role,content:m.content}));
    const res=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system:sysPrompt,
        messages:history
      })
    });
    const data=await res.json();
    document.getElementById('typing')?.remove();
    const rawReply=data.content?.[0]?.text||'{"action":"reply","message":"Lo siento, no pude responder."}';
    
    // Intentar parsear como JSON
    let parsed=null;
    try{
      // Extraer JSON si viene envuelto en texto
      const jsonMatch=rawReply.match(/\{[\s\S]*\}/);
      if(jsonMatch) parsed=JSON.parse(jsonMatch[0]);
    }catch(e){parsed=null;}

    if(parsed&&parsed.action&&parsed.action!=='reply'){
      // Acción a ejecutar - mostrar card de confirmación
      const msg=parsed.message||'Encontré lo que necesitas. ¿Confirmas?';
      messages.push({role:'assistant',content:msg});
      showActionCard(parsed,msg);
    } else {
      // Solo respuesta de texto
      const msg=parsed?.message||rawReply;
      addMsg(msg,'ai');
    }
  }catch(e){
    document.getElementById('typing')?.remove();
    addMsg('Error de conexión. Verifica tu internet.','ai');
  }
  document.getElementById('ai-status').textContent='En línea';
}
</script>
</body>
</html>
