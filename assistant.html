<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E9EE0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Life Tracker · Asistente IA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--b:#2E9EE0;--b2:#1470A8;--sky:#EAF5FF;--t:#0D2137;--tm:#3A5570;--tl:#7A9AB8;--gr:#2EAF7D;--pk:#E8547A;--br:rgba(46,158,224,0.15);--g2:linear-gradient(135deg,#2E9EE0,#1470A8)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f0f7ff;min-height:100vh;color:var(--t)}
.app{max-width:430px;margin:0 auto;background:#f0f7ff;min-height:100vh;display:flex;flex-direction:column}
.header{background:#fff;padding:50px 20px 14px;border-bottom:1px solid rgba(46,158,224,0.08);flex-shrink:0}
.header-row{display:flex;align-items:center;gap:12px}
.ai-avatar{width:44px;height:44px;background:var(--g2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 12px rgba(46,158,224,0.3);flex-shrink:0}
.ai-info{flex:1}
.ai-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--t)}
.ai-status{font-size:.6rem;color:var(--gr);font-weight:600}
.ai-status::before{content:'● ';font-size:.5rem}
.clear-btn{background:var(--sky);border:1px solid var(--br);border-radius:10px;padding:6px 12px;font-size:.62rem;font-weight:600;color:var(--b2);cursor:pointer;font-family:'DM Sans',sans-serif}
/* SUGGESTIONS */
.suggestions{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.suggestions::-webkit-scrollbar{display:none}
.sug{background:#fff;border:1px solid var(--br);border-radius:20px;padding:7px 14px;font-size:.62rem;font-weight:600;color:var(--b2);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .2s}
.sug:hover{background:var(--sky)}
/* CHAT */
.chat{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:16px}
.chat::-webkit-scrollbar{display:none}
.msg{display:flex;gap:8px;align-items:flex-end;max-width:100%}
.msg.user{flex-direction:row-reverse}
.msg-bubble{max-width:78%;padding:10px 13px;border-radius:18px;font-size:.73rem;line-height:1.55;font-weight:400}
.msg.ai .msg-bubble{background:#fff;color:var(--t);border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(46,158,224,0.08);border:1px solid rgba(46,158,224,0.08)}
.msg.user .msg-bubble{background:var(--g2);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:.5rem;color:var(--tl);flex-shrink:0;margin-bottom:3px}
.msg-avatar{width:26px;height:26px;border-radius:50%;background:var(--g2);display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;margin-bottom:3px}
.typing{display:flex;gap:3px;padding:10px 13px;background:#fff;border-radius:18px;border-bottom-left-radius:4px;width:fit-content;box-shadow:0 2px 8px rgba(46,158,224,0.08);border:1px solid rgba(46,158,224,0.08)}
.typing span{width:5px;height:5px;background:var(--tl);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
/* INPUT */
.input-bar{background:#fff;border-top:1px solid rgba(46,158,224,0.08);padding:10px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.input-field{flex:1;background:var(--sky);border:1.5px solid transparent;border-radius:22px;padding:10px 16px;font-size:.75rem;color:var(--t);font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;max-height:100px;resize:none;line-height:1.4}
.input-field:focus{border-color:var(--b);background:#fff}
.mic-btn{width:40px;height:40px;background:var(--sky);border:1.5px solid var(--br);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;flex-shrink:0;transition:all .2s}
.mic-btn.listening{background:var(--pk);border-color:var(--pk);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.send-btn{width:40px;height:40px;background:var(--g2);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;flex-shrink:0;box-shadow:0 4px 12px rgba(46,158,224,0.3);color:#fff;transition:all .2s}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.send-btn:active{transform:scale(.9)}
/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid rgba(46,158,224,0.1);padding:8px 10px 24px;display:flex;justify-content:space-around;z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:14px;cursor:pointer;text-decoration:none}
.nav-item.active{background:var(--sky)}
.nav-icon{font-size:1.2rem}
.nav-label{font-size:.52rem;font-weight:600;color:var(--tl)}
.nav-item.active .nav-label{color:var(--b2)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <div class="ai-avatar">✨</div>
      <div class="ai-info">
        <div class="ai-name">Life AI</div>
        <div class="ai-status" id="ai-status">En línea</div>
      </div>
      <button class="clear-btn" onclick="clearChat()">Limpiar</button>
    </div>
  </div>

  <div class="suggestions">
    <div class="sug" onclick="sendSuggestion('¿Cómo voy con mis hábitos esta semana?')">📊 ¿Cómo voy?</div>
    <div class="sug" onclick="sendSuggestion('Dame un resumen de mi semana')">📋 Mi resumen</div>
    <div class="sug" onclick="sendSuggestion('Necesito motivación para hoy')">💪 Motivación</div>
    <div class="sug" onclick="sendSuggestion('¿Qué tareas tengo pendientes hoy?')">✅ Mis tareas</div>
    <div class="sug" onclick="sendSuggestion('Ayúdame a organizar mi día')">🗓️ Organizar día</div>
    <div class="sug" onclick="sendSuggestion('Dame un consejo de productividad')">🧠 Consejo</div>
  </div>

  <div class="chat" id="chat">
    <!-- Welcome message -->
    <div class="msg ai">
      <div class="msg-avatar">✨</div>
      <div>
        <div class="msg-bubble">Hola 👋 Soy tu asistente personal de Life Tracker. Puedo ayudarte con tus hábitos, tareas, metas y más. ¿En qué te ayudo hoy?</div>
        <div class="msg-time" id="welcome-time"></div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <textarea class="input-field" id="msg-input" placeholder="Escribe o usa el micrófono..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <div class="mic-btn" id="mic-btn" onclick="toggleVoice()">🎙️</div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <nav class="nav" style="position:relative;border-top:1px solid rgba(46,158,224,0.1)">
    <a class="nav-item" href="dashboard.html"><div class="nav-icon">🏠</div><div class="nav-label">Inicio</div></a>
    <a class="nav-item" href="calendar.html"><div class="nav-icon">📅</div><div class="nav-label">Calendario</div></a>
    <a class="nav-item" href="tasks.html"><div class="nav-icon">✅</div><div class="nav-label">Tareas</div></a>
    <a class="nav-item" href="notes.html"><div class="nav-icon">🗒️</div><div class="nav-label">Notas</div></a>
    <a class="nav-item active" href="assistant.html"><div class="nav-icon">🤖</div><div class="nav-label">IA</div></a>
  </nav>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import{getFirestore,collection,getDocs,query,where,orderBy,limit}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyB1SG1XpJh8yeH-Ub4sMfWN5NpYkCHhTNM",authDomain:"lifetracker26-30037.firebaseapp.com",projectId:"lifetracker26-30037",storageBucket:"lifetracker26-30037.firebasestorage.app",messagingSenderId:"375272536562",appId:"1:375272536562:web:33cfead324a6e3a049136b"};
const app=initializeApp(cfg);const auth=getAuth(app);const db=getFirestore(app);
let currentUser=null,messages=[],isListening=false,recognition=null;

// Welcome time
document.getElementById('welcome-time').textContent=new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='index.html';return;}
  currentUser=user;
  // Load context
  await buildContext();
});

let userContext='';

async function buildContext(){
  if(!currentUser)return;
  try{
    const today=new Date().toISOString().split('T')[0];
    // Tasks
    const tq=query(collection(db,'tasks'),where('uid','==',currentUser.uid),where('date','==',today),where('done','==',false));
    const tsnap=await getDocs(tq);
    const tasks=[];tsnap.forEach(d=>tasks.push(d.data().text));
    // Habits
    const hq=query(collection(db,'habits'),where('uid','==',currentUser.uid));
    const hsnap=await getDocs(hq);
    const habits=[];
    hsnap.forEach(d=>{const h=d.data();habits.push(`${h.name} (racha: ${h.streak||0} días)`);});
    // Goals
    const gq=query(collection(db,'goals'),where('uid','==',currentUser.uid));
    const gsnap=await getDocs(gq);
    const goals=[];gsnap.forEach(d=>goals.push(`${d.data().name} ${d.data().progress||0}%`));
    const name=(currentUser.displayName||currentUser.email).split(' ')[0];
    const h=new Date().getHours();
    const greeting=h<12?'mañana':h<18?'tarde':'noche';
    userContext=`Eres Life AI, el asistente personal inteligente de Life Tracker. Hablas en español, eres cálido, motivador y conciso. Conoces a tu usuaria.

Usuario: ${name}
Fecha: ${today} (${greeting})
Tareas pendientes hoy: ${tasks.length>0?tasks.join(', '):'ninguna'}
Hábitos activos: ${habits.length>0?habits.join(', '):'ninguno'}
Metas del mes: ${goals.length>0?goals.join(', '):'ninguna'}

Responde siempre en español. Sé conciso (máximo 3-4 oraciones). Usa emojis con moderación. Si te piden recordatorios o tareas específicas, confirma que los registrarás y da instrucciones claras.`;
  }catch(e){userContext='Eres Life AI, asistente personal en español. Sé cálido, motivador y conciso.';}
}

window.sendMessage=async function(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text||document.getElementById('send-btn').disabled)return;
  input.value='';
  autoResize(input);
  addMessage(text,'user');
  await callAI(text);
};

window.sendSuggestion=async function(text){
  addMessage(text,'user');
  await callAI(text);
};

window.handleKey=function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
};

window.autoResize=function(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
};

function addMessage(text,role){
  const time=new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  messages.push({role,content:text});
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  if(role==='ai'){
    div.innerHTML=`<div class="msg-avatar">✨</div><div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${time}</div></div>`;
  }else{
    div.innerHTML=`<div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time" style="text-align:right">${time}</div></div>`;
  }
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className='msg ai';div.id='typing-indicator';
  div.innerHTML=`<div class="msg-avatar">✨</div><div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function hideTyping(){
  const t=document.getElementById('typing-indicator');
  if(t)t.remove();
}

async function callAI(text){
  const btn=document.getElementById('send-btn');
  btn.disabled=true;
  document.getElementById('ai-status').textContent='Escribiendo...';
  showTyping();
  try{
    const msgHistory=messages.slice(-10).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content}));
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        system:userContext,
        messages:msgHistory
      })
    });
    const data=await res.json();
    hideTyping();
    const reply=data.content?.[0]?.text||'Lo siento, no pude procesar tu mensaje. Intenta de nuevo.';
    addMessage(reply,'ai');
  }catch(e){
    hideTyping();
    addMessage('Hubo un problema de conexión. Verifica tu internet e intenta de nuevo.','ai');
  }
  btn.disabled=false;
  document.getElementById('ai-status').textContent='En línea';
}

window.clearChat=function(){
  messages=[];
  const chat=document.getElementById('chat');
  chat.innerHTML=`<div class="msg ai"><div class="msg-avatar">✨</div><div><div class="msg-bubble">Chat limpiado. ¿En qué te ayudo? 😊</div></div></div>`;
};

// VOICE
window.toggleVoice=function(){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){
    alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome.');return;
  }
  if(isListening){stopVoice();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='es-MX';recognition.continuous=false;recognition.interimResults=false;
  recognition.onstart=()=>{isListening=true;document.getElementById('mic-btn').classList.add('listening');document.getElementById('ai-status').textContent='Escuchando...';};
  recognition.onresult=e=>{
    const text=e.results[0][0].transcript;
    document.getElementById('msg-input').value=text;
    stopVoice();
    sendMessage();
  };
  recognition.onerror=()=>stopVoice();
  recognition.onend=()=>stopVoice();
  recognition.start();
};

function stopVoice(){
  isListening=false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('ai-status').textContent='En línea';
  if(recognition)recognition.stop();
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW activo:', reg.scope))
      .catch(() => {});
  });
}
</script>
</body>
</html>
