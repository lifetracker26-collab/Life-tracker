<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E9EE0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Life Tracker · Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#2E9EE0;--b2:#1470A8;--sky:#EAF5FF;--t:#0D2137;--tl:#7A9AB8;--gr:#2EAF7D;--pk:#E8547A;--g2:linear-gradient(135deg,#2E9EE0,#1470A8)}
body{font-family:'DM Sans',sans-serif;background:#f0f7ff;color:var(--t)}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.header{background:#fff;padding:50px 20px 16px;border-bottom:1px solid rgba(46,158,224,0.1)}
.hrow{display:flex;justify-content:space-between;align-items:center}
.htitle{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700}
.htitle span{background:var(--g2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.addbtn{background:var(--g2);border:none;border-radius:12px;padding:9px 18px;color:#fff;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.scroll{padding:16px;display:flex;flex-direction:column;gap:14px}
.tabs{display:flex;background:var(--sky);border-radius:12px;padding:3px;gap:2px}
.tab{flex:1;text-align:center;padding:9px;border-radius:9px;font-size:.65rem;font-weight:700;color:var(--tl);cursor:pointer;-webkit-tap-highlight-color:transparent}
.tab.active{background:#fff;color:var(--b2);box-shadow:0 2px 8px rgba(46,158,224,0.1)}
.rutina{background:var(--g2);border-radius:20px;padding:16px}
.ruhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.rutitle{font-size:.73rem;font-weight:700;color:#fff}
.rubadge{background:rgba(255,255,255,.2);border-radius:10px;padding:2px 8px;font-size:.6rem;font-weight:700;color:#fff}
.ritem{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.12)}
.ritem:last-child{border-bottom:none}
.rchk{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.rchk.done{background:rgba(255,255,255,.9);border-color:transparent;color:var(--b2);font-size:.65rem}
.rtxt{font-size:.72rem;color:rgba(255,255,255,.9);flex:1}
.rtxt.done{opacity:.5;text-decoration:line-through}
.radd{display:flex;gap:8px;margin-top:10px}
.radd-in{flex:1;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:9px 12px;font-size:.7rem;color:#fff;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.radd-in::placeholder{color:rgba(255,255,255,.5)}
.radd-btn{background:rgba(255,255,255,.22);border:none;border-radius:10px;padding:9px 16px;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card{background:#fff;border-radius:20px;padding:16px;box-shadow:0 4px 14px rgba(46,158,224,0.08);border:1px solid rgba(46,158,224,0.07)}
.chdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ctitle{font-size:.73rem;font-weight:700;display:flex;align-items:center;gap:6px}
.badge{background:var(--sky);border-radius:10px;padding:2px 8px;font-size:.6rem;font-weight:700;color:var(--b2)}
.titem{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(46,158,224,0.06)}
.titem:last-child{border-bottom:none}
.tchk{width:22px;height:22px;border-radius:50%;border:2px solid rgba(46,158,224,0.25);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:#fff;-webkit-tap-highlight-color:transparent}
.tchk.done{background:var(--gr);border-color:var(--gr);color:#fff;font-size:.65rem}
.tinfo{flex:1}
.ttxt{font-size:.73rem;color:var(--t);font-weight:500}
.ttxt.done{text-decoration:line-through;color:var(--tl)}
.ttag{font-size:.55rem;font-weight:600;padding:1px 7px;border-radius:6px;margin-right:4px;display:inline-block}
.ttag-t{background:var(--sky);color:var(--b2)}
.ttag-u{background:rgba(232,84,122,0.1);color:var(--pk)}
.tdel{background:none;border:none;color:var(--tl);font-size:.85rem;cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent}
.empty{text-align:center;padding:20px;font-size:.72rem;color:var(--tl)}
.qarow{display:flex;gap:8px;margin-top:10px}
.qain{flex:1;background:var(--sky);border:1.5px solid transparent;border-radius:10px;padding:9px 12px;font-size:.73rem;color:var(--t);font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.qain:focus{border-color:var(--b);background:#fff}
.qabtn{background:var(--g2);border:none;border-radius:10px;padding:9px 18px;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.overlay{position:fixed;inset:0;background:rgba(13,33,55,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.overlay.show .modal{transform:translateY(0)}
.mtitle{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:16px}
.min{width:100%;background:var(--sky);border:1.5px solid transparent;border-radius:12px;padding:12px 14px;font-size:.8rem;color:var(--t);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;-webkit-appearance:none;display:block}
.min:focus{border-color:var(--b)}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.mlbl{font-size:.62rem;font-weight:700;color:#3A5570;margin-bottom:4px}
.prow{display:flex;gap:8px;margin-bottom:16px}
.pbtn{flex:1;text-align:center;padding:10px;border-radius:10px;background:var(--sky);border:1.5px solid rgba(46,158,224,0.2);font-size:.65rem;font-weight:700;color:var(--b2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.pbtn.sn{background:var(--b);border-color:var(--b);color:#fff}
.pbtn.su{background:var(--pk);border-color:var(--pk);color:#fff}
.msave{width:100%;background:var(--g2);border:none;border-radius:14px;padding:14px;color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:8px}
.mcancel{width:100%;background:transparent;border:none;padding:10px;color:var(--tl);font-size:.72rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid rgba(46,158,224,0.1);padding:8px 6px 24px;display:flex;justify-content:space-around;z-index:50}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:14px;text-decoration:none;-webkit-tap-highlight-color:transparent}
.ni.active{background:var(--sky)}
.ni-icon{font-size:1.2rem}
.ni-label{font-size:.52rem;font-weight:600;color:var(--tl)}
.ni.active .ni-label{color:var(--b2)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--t);color:#fff;padding:10px 20px;border-radius:12px;font-size:.7rem;font-weight:600;z-index:300;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="hrow">
      <div class="htitle">Mis <span>Tareas</span></div>
      <button class="addbtn" onclick="openModal()">＋ Nueva</button>
    </div>
  </div>
  <div class="scroll">
    <div class="tabs">
      <div class="tab active" id="tab-today" onclick="switchTab('today')">Hoy</div>
      <div class="tab" id="tab-week" onclick="switchTab('week')">Semana</div>
      <div class="tab" id="tab-done" onclick="switchTab('done')">Completadas</div>
    </div>
    <div class="rutina">
      <div class="ruhdr"><div class="rutitle">🌅 Rutina matutina</div><div class="rubadge" id="rbadge">0/0</div></div>
      <div id="rlist"><div style="font-size:.68rem;color:rgba(255,255,255,.6)">Agrega pasos a tu rutina ↓</div></div>
      <div class="radd">
        <input class="radd-in" id="radd-in" placeholder="Agregar paso..." onkeydown="if(event.key==='Enter')addRutina()">
        <button class="radd-btn" onclick="addRutina()">+</button>
      </div>
    </div>
    <div class="card">
      <div class="chdr"><div class="ctitle">📋 Pendientes <span class="badge" id="pbadge">0</span></div></div>
      <div id="tlist"><div class="empty">Cargando...</div></div>
      <div class="qarow">
        <input class="qain" id="qa-in" placeholder="Tarea rápida..." onkeydown="if(event.key==='Enter')quickAdd()">
        <button class="qabtn" onclick="quickAdd()">+</button>
      </div>
    </div>
    <div class="card" id="done-card" style="display:none">
      <div class="chdr"><div class="ctitle">✅ Completadas <span class="badge" id="dbadge">0</span></div></div>
      <div id="dlist"></div>
    </div>
  </div>
  <nav class="nav">
    <a class="ni" href="dashboard.html"><div class="ni-icon">🏠</div><div class="ni-label">Inicio</div></a>
    <a class="ni" href="calendar.html"><div class="ni-icon">📅</div><div class="ni-label">Calendario</div></a>
    <a class="ni active" href="tasks.html"><div class="ni-icon">✅</div><div class="ni-label">Tareas</div></a>
    <a class="ni" href="notes.html"><div class="ni-icon">🗒️</div><div class="ni-label">Notas</div></a>
    <a class="ni" href="profile.html"><div class="ni-icon">👤</div><div class="ni-label">Perfil</div></a>
  </nav>
</div>
<div class="overlay" id="modal">
  <div class="modal">
    <div class="mtitle">✅ Nueva tarea</div>
    <input class="min" id="m-text" placeholder="¿Qué necesitas hacer?">
    <div class="mrow">
      <div><div class="mlbl">Fecha</div><input class="min" type="date" id="m-date" style="margin-bottom:0"></div>
      <div><div class="mlbl">Hora</div><input class="min" type="time" id="m-time" style="margin-bottom:0"></div>
    </div>
    <div class="mlbl" style="margin-top:12px;margin-bottom:6px">Prioridad</div>
    <div class="prow">
      <div class="pbtn sn" id="btn-n" onclick="setPriority('normal')">Normal</div>
      <div class="pbtn" id="btn-u" onclick="setPriority('urgent')">🔥 Urgente</div>
    </div>
    <button class="msave" onclick="saveTask()">Guardar tarea →</button>
    <button class="mcancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,collection,getDocs,addDoc,updateDoc,deleteDoc,query,where,serverTimestamp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyB1SG1XpJh8yeH-Ub4sMfWN5NpYkCHhTNM",authDomain:"lifetracker26-30037.firebaseapp.com",projectId:"lifetracker26-30037",storageBucket:"lifetracker26-30037.firebasestorage.app",messagingSenderId:"375272536562",appId:"1:375272536562:web:33cfead324a6e3a049136b"});
const auth=getAuth(app),db=getFirestore(app);
const today=new Date().toISOString().split('T')[0];
let uid=null,allTasks=[],curTab='today',curP='normal',rItems=[],rDone=[];

document.getElementById('m-date').value=today;

function showToast(msg,c){const el=document.getElementById('toast');el.textContent=msg;el.style.background=c||'#0D2137';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

onAuthStateChanged(auth,async user=>{
  if(!user){location.href='index.html';return;}
  uid=user.uid;
  loadRutina();
  loadTasks();
});

async function loadTasks(){
  try{
    const snap=await getDocs(query(collection(db,'tasks'),where('uid','==',uid)));
    allTasks=[];
    snap.forEach(d=>allTasks.push({id:d.id,...d.data()}));
    allTasks.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    renderTasks();
  }catch(e){showToast('Error cargando tareas','#E8547A');}
}

function renderTasks(){
  const end=new Date();end.setDate(end.getDate()+7);
  const endStr=end.toISOString().split('T')[0];
  let pending=[],done=[];
  allTasks.forEach(t=>{
    if(t.done){done.push(t);}
    else if(curTab==='today'&&t.date===today) pending.push(t);
    else if(curTab==='week'&&t.date>=today&&t.date<=endStr) pending.push(t);
  });
  document.getElementById('pbadge').textContent=pending.length;
  document.getElementById('dbadge').textContent=done.length;
  const tl=document.getElementById('tlist');
  if(!pending.length&&curTab!=='done'){tl.innerHTML='<div class="empty">Sin tareas pendientes 🎉</div>';}
  else{tl.innerHTML=pending.map(t=>`<div class="titem" id="ti-${t.id}"><div class="tchk" onclick="doneTask('${t.id}')"></div><div class="tinfo"><div class="ttxt">${t.text}</div>${t.time?`<span class="ttag ttag-t">⏰ ${t.time}</span>`:''}${t.priority==='urgent'?'<span class="ttag ttag-u">🔥 Urgente</span>':''}</div><button class="tdel" onclick="delTask('${t.id}')">🗑</button></div>`).join('');}
  const dc=document.getElementById('done-card'),dl=document.getElementById('dlist');
  if(curTab==='done'){dc.style.display='block';dl.innerHTML=done.length?done.map(t=>`<div class="titem"><div class="tchk done">✓</div><div class="tinfo"><div class="ttxt done">${t.text}</div></div><button class="tdel" onclick="delTask('${t.id}')">🗑</button></div>`).join(''):'<div class="empty">Nada completado aún</div>';}
  else dc.style.display='none';
}

window.switchTab=function(t){curTab=t;['today','week','done'].forEach(x=>document.getElementById('tab-'+x).classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');renderTasks();};
window.doneTask=async function(id){try{await updateDoc(doc(db,'tasks',id),{done:true,doneAt:serverTimestamp()});const t=allTasks.find(t=>t.id===id);if(t)t.done=true;renderTasks();showToast('✅ ¡Completada!','#2EAF7D');}catch(e){showToast('Error','#E8547A');}};
window.delTask=async function(id){try{await deleteDoc(doc(db,'tasks',id));allTasks=allTasks.filter(t=>t.id!==id);renderTasks();showToast('Eliminada','#0D2137');}catch(e){showToast('Error','#E8547A');}};
window.quickAdd=async function(){const inp=document.getElementById('qa-in');const text=inp.value.trim();if(!text)return;inp.value='';try{const ref=await addDoc(collection(db,'tasks'),{uid,text,date:today,done:false,priority:'normal',createdAt:serverTimestamp()});allTasks.unshift({id:ref.id,uid,text,date:today,done:false,priority:'normal'});renderTasks();showToast('Tarea agregada ✅','#2EAF7D');}catch(e){showToast('Error: '+e.message,'#E8547A');}};
window.openModal=function(){document.getElementById('modal').classList.add('show');};
window.closeModal=function(){document.getElementById('modal').classList.remove('show');};
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)window.closeModal();});
window.setPriority=function(p){curP=p;document.getElementById('btn-n').className='pbtn'+(p==='normal'?' sn':'');document.getElementById('btn-u').className='pbtn'+(p==='urgent'?' su':'');};
window.saveTask=async function(){const text=document.getElementById('m-text').value.trim();const date=document.getElementById('m-date').value||today;const time=document.getElementById('m-time').value||null;if(!text){showToast('⚠️ Escribe la tarea','#E8547A');return;}try{const ref=await addDoc(collection(db,'tasks'),{uid,text,date,time,done:false,priority:curP,createdAt:serverTimestamp()});allTasks.unshift({id:ref.id,uid,text,date,time,done:false,priority:curP});window.closeModal();document.getElementById('m-text').value='';document.getElementById('m-time').value='';renderTasks();showToast('Tarea guardada ✅','#2EAF7D');}catch(e){showToast('Error: '+e.message,'#E8547A');}};

// RUTINA
async function loadRutina(){
  try{
    const rs=await getDoc(doc(db,'routines',uid+'_morning'));
    rItems=rs.exists()?(rs.data().items||[]):[];
    const ds=await getDoc(doc(db,'routine_done',uid+'_'+today));
    rDone=ds.exists()?(ds.data().done||[]):[];
    renderRutina();
  }catch(e){renderRutina();}
}
function renderRutina(){
  document.getElementById('rbadge').textContent=rDone.length+'/'+rItems.length;
  if(!rItems.length){document.getElementById('rlist').innerHTML='<div style="font-size:.68rem;color:rgba(255,255,255,.6)">Agrega pasos ↓</div>';return;}
  document.getElementById('rlist').innerHTML=rItems.map((item,i)=>{const done=rDone.includes(i);return`<div class="ritem"><div class="rchk ${done?'done':''}" onclick="toggleRutina(${i})">${done?'✓':''}</div><div class="rtxt ${done?'done':''}">${item}</div></div>`;}).join('');
}
window.toggleRutina=async function(idx){if(rDone.includes(idx))rDone=rDone.filter(i=>i!==idx);else rDone.push(idx);try{await setDoc(doc(db,'routine_done',uid+'_'+today),{uid,date:today,done:rDone});renderRutina();}catch(e){showToast('Error','#E8547A');}};
window.addRutina=async function(){const inp=document.getElementById('radd-in');const text=inp.value.trim();if(!text)return;rItems.push(text);try{await setDoc(doc(db,'routines',uid+'_morning'),{uid,items:rItems,updatedAt:serverTimestamp()});inp.value='';renderRutina();showToast('Agregado a rutina 🌅','#2EAF7D');}catch(e){showToast('Error','#E8547A');}};
</script>
</body>
</html>
