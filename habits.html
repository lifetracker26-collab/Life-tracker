<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E9EE0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Life Tracker · Hábitos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--b:#2E9EE0;--b2:#1470A8;--sky:#EAF5FF;--t:#0D2137;--tm:#3A5570;--tl:#7A9AB8;--gr:#2EAF7D;--pk:#E8547A;--am:#F59E0B;--br:rgba(46,158,224,0.15);--g2:linear-gradient(135deg,#2E9EE0,#1470A8)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f0f7ff;min-height:100vh;color:var(--t)}
.app{max-width:430px;margin:0 auto;background:#f0f7ff;min-height:100vh;padding-bottom:80px}
.header{background:#fff;padding:50px 20px 16px;border-bottom:1px solid rgba(46,158,224,0.08)}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--t)}
.header-title span{background:var(--g2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.add-btn{background:var(--g2);border:none;border-radius:12px;padding:8px 16px;color:#fff;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 12px rgba(46,158,224,0.3)}
.scroll{padding:16px;display:flex;flex-direction:column;gap:14px}
/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-card{background:#fff;border-radius:16px;padding:12px;text-align:center;box-shadow:0 4px 12px rgba(46,158,224,0.08);border:1px solid rgba(46,158,224,0.08)}
.stat-num{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--t)}
.stat-label{font-size:.58rem;font-weight:600;color:var(--tl);margin-top:2px}
/* HABIT CARD */
.habit-card{background:#fff;border-radius:20px;padding:16px;box-shadow:0 4px 16px rgba(46,158,224,0.08);border:1px solid rgba(46,158,224,0.08);transition:all .2s}
.habit-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.habit-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.habit-info{flex:1}
.habit-name{font-size:.8rem;font-weight:700;color:var(--t);margin-bottom:2px}
.habit-meta{font-size:.6rem;color:var(--tl)}
.habit-streak{display:flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;color:var(--am)}
.complete-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--br);background:var(--sky);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:all .25s;flex-shrink:0}
.complete-btn.done{background:var(--gr);border-color:var(--gr);transform:scale(1.1)}
.habit-progress{height:5px;background:var(--sky);border-radius:3px;overflow:hidden;margin-bottom:8px}
.habit-fill{height:100%;border-radius:3px;transition:width .6s ease}
/* WEEK DOTS */
.week-dots{display:flex;gap:4px;justify-content:space-between}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wd-label{font-size:.48rem;font-weight:600;color:var(--tl);text-transform:uppercase}
.wd-dot{width:100%;aspect-ratio:1;border-radius:50%;background:var(--sky);max-width:22px;transition:all .2s}
.wd-dot.done{background:var(--gr)}
.wd-dot.today{border:2px solid var(--b)}
.empty-state{text-align:center;padding:24px;background:#fff;border-radius:20px;box-shadow:0 4px 12px rgba(46,158,224,0.06)}
.empty-icon{font-size:2rem;margin-bottom:8px}
.empty-text{font-size:.75rem;color:var(--tl);margin-bottom:12px}
.empty-btn{background:var(--g2);border:none;border-radius:12px;padding:10px 20px;color:#fff;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(13,33,55,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--t);margin-bottom:16px}
.modal-input{width:100%;background:var(--sky);border:1.5px solid transparent;border-radius:12px;padding:12px 14px;font-size:.8rem;color:var(--t);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px}
.modal-input:focus{border-color:var(--b)}
.emoji-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.ep-btn{font-size:1.4rem;width:40px;height:40px;border-radius:10px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--sky)}
.ep-btn.sel{border-color:var(--b);background:rgba(46,158,224,0.1)}
.color-row{display:flex;gap:8px;margin-bottom:16px}
.clr{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.clr.sel{border-color:#fff;box-shadow:0 0 0 2px var(--t);transform:scale(1.1)}
.modal-label{font-size:.62rem;font-weight:700;color:var(--tm);margin-bottom:6px}
.modal-save{width:100%;background:var(--g2);border:none;border-radius:14px;padding:13px;color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 6px 20px rgba(46,158,224,0.3)}
.modal-cancel{width:100%;background:transparent;border:none;padding:10px;color:var(--tl);font-size:.72rem;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid rgba(46,158,224,0.1);padding:8px 10px 24px;display:flex;justify-content:space-around;z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:14px;cursor:pointer;text-decoration:none}
.nav-item.active{background:var(--sky)}
.nav-icon{font-size:1.2rem}
.nav-label{font-size:.52rem;font-weight:600;color:var(--tl)}
.nav-item.active .nav-label{color:var(--b2)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--t);color:#fff;padding:10px 18px;border-radius:12px;font-size:.7rem;font-weight:600;z-index:200;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scroll>*{animation:fadeUp .35s ease both}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-title">Mis <span>Hábitos</span></div>
      <button class="add-btn" onclick="openModal()">＋ Nuevo hábito</button>
    </div>
  </div>

  <div class="scroll">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Hábitos</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Hoy ✅</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">🔥 Mejor racha</div></div>
    </div>

    <!-- HABITS -->
    <div id="habits-container">
      <div class="empty-state">
        <div class="empty-icon">🎯</div>
        <div class="empty-text">Aún no tienes hábitos.<br>¡Crea el primero ahora!</div>
        <button class="empty-btn" onclick="openModal()">＋ Crear hábito</button>
      </div>
    </div>
  </div>

  <nav class="nav">
    <a class="nav-item" href="dashboard.html"><div class="nav-icon">🏠</div><div class="nav-label">Inicio</div></a>
    <a class="nav-item" href="calendar.html"><div class="nav-icon">📅</div><div class="nav-label">Calendario</div></a>
    <a class="nav-item active" href="habits.html"><div class="nav-icon">🎯</div><div class="nav-label">Hábitos</div></a>
    <a class="nav-item" href="notes.html"><div class="nav-icon">🗒️</div><div class="nav-label">Notas</div></a>
    <a class="nav-item" href="profile.html"><div class="nav-icon">👤</div><div class="nav-label">Perfil</div></a>
  </nav>
</div>

<!-- HABIT MODAL -->
<div class="modal-overlay" id="habit-modal">
  <div class="modal">
    <div class="modal-title">🎯 Nuevo hábito</div>
    <div class="modal-label">Ícono</div>
    <div class="emoji-picker">
      <div class="ep-btn sel" data-e="🏃" onclick="selectEmoji('🏃',this)">🏃</div>
      <div class="ep-btn" data-e="💪" onclick="selectEmoji('💪',this)">💪</div>
      <div class="ep-btn" data-e="📚" onclick="selectEmoji('📚',this)">📚</div>
      <div class="ep-btn" data-e="🧘" onclick="selectEmoji('🧘',this)">🧘</div>
      <div class="ep-btn" data-e="💧" onclick="selectEmoji('💧',this)">💧</div>
      <div class="ep-btn" data-e="🥗" onclick="selectEmoji('🥗',this)">🥗</div>
      <div class="ep-btn" data-e="😴" onclick="selectEmoji('😴',this)">😴</div>
      <div class="ep-btn" data-e="✍️" onclick="selectEmoji('✍️',this)">✍️</div>
      <div class="ep-btn" data-e="🎵" onclick="selectEmoji('🎵',this)">🎵</div>
      <div class="ep-btn" data-e="🌿" onclick="selectEmoji('🌿',this)">🌿</div>
    </div>
    <div class="modal-label">Nombre del hábito</div>
    <input class="modal-input" id="h-name" placeholder="Ej: Ejercicio 30 min">
    <div class="modal-label">Color</div>
    <div class="color-row">
      <div class="clr sel" style="background:#2E9EE0" onclick="selectColor('#2E9EE0',this)"></div>
      <div class="clr" style="background:#2EAF7D" onclick="selectColor('#2EAF7D',this)"></div>
      <div class="clr" style="background:#E8547A" onclick="selectColor('#E8547A',this)"></div>
      <div class="clr" style="background:#F59E0B" onclick="selectColor('#F59E0B',this)"></div>
      <div class="clr" style="background:#8B5CF6" onclick="selectColor('#8B5CF6',this)"></div>
    </div>
    <div class="modal-label">Recordatorio diario</div>
    <input class="modal-input" type="time" id="h-time" placeholder="Hora del recordatorio">
    <button class="modal-save" onclick="saveHabit()">Crear hábito →</button>
    <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import{getFirestore,collection,addDoc,getDocs,query,where,deleteDoc,doc,updateDoc,serverTimestamp,arrayUnion,arrayRemove}from"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyB1SG1XpJh8yeH-Ub4sMfWN5NpYkCHhTNM",authDomain:"lifetracker26-30037.firebaseapp.com",projectId:"lifetracker26-30037",storageBucket:"lifetracker26-30037.firebasestorage.app",messagingSenderId:"375272536562",appId:"1:375272536562:web:33cfead324a6e3a049136b"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);
let currentUser=null,habits=[],selEmoji='🏃',selColor='#2E9EE0';
const DAYS=['L','M','M','J','V','S','D'];

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='index.html';return;}
  currentUser=user;
  await loadHabits();
});

async function loadHabits(){
  const q=query(collection(db,'habits'),where('uid','==',currentUser.uid));
  const snap=await getDocs(q);
  habits=[];
  snap.forEach(d=>habits.push({id:d.id,...d.data()}));
  renderHabits();
}

function getWeekDates(){
  const today=new Date();
  const day=today.getDay();
  const diff=today.getDate()-(day===0?6:day-1);
  const mon=new Date(today.setDate(diff));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split('T')[0];});
}

function calcStreak(completedDates){
  if(!completedDates||completedDates.length===0)return 0;
  const sorted=[...completedDates].sort().reverse();
  const today=new Date().toISOString().split('T')[0];
  let streak=0,check=today;
  for(let i=0;i<365;i++){
    if(sorted.includes(check))streak++;
    else if(streak>0)break;
    const d=new Date(check);d.setDate(d.getDate()-1);
    check=d.toISOString().split('T')[0];
  }
  return streak;
}

function renderHabits(){
  const today=new Date().toISOString().split('T')[0];
  const week=getWeekDates();
  const todayDone=habits.filter(h=>h.completedDates?.includes(today)).length;
  const bestStreak=habits.reduce((max,h)=>Math.max(max,h.streak||0),0);
  document.getElementById('stat-total').textContent=habits.length;
  document.getElementById('stat-done').textContent=todayDone;
  document.getElementById('stat-streak').textContent=bestStreak;
  const cont=document.getElementById('habits-container');
  if(habits.length===0){
    cont.innerHTML=`<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-text">Aún no tienes hábitos.<br>¡Crea el primero ahora!</div><button class="empty-btn" onclick="openModal()">＋ Crear hábito</button></div>`;
    return;
  }
  cont.innerHTML=habits.map(h=>{
    const streak=h.streak||0;
    const completed=h.completedDates||[];
    const isToday=completed.includes(today);
    const pct=Math.min((streak/30)*100,100);
    const dots=week.map((d,i)=>{
      const isDone=completed.includes(d);
      const isT=d===today;
      return`<div class="wd"><div class="wd-label">${DAYS[i]}</div><div class="wd-dot ${isDone?'done':''} ${isT?'today':''}"></div></div>`;
    }).join('');
    return`<div class="habit-card" id="hc-${h.id}">
      <div class="habit-top">
        <div class="habit-icon" style="background:${h.color}20">${h.emoji||'🎯'}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-streak">🔥 ${streak} días</div>
        </div>
        <div class="complete-btn ${isToday?'done':''}" onclick="toggleHabit('${h.id}')">${isToday?'✓':'○'}</div>
      </div>
      <div class="habit-progress"><div class="habit-fill" style="width:${pct}%;background:${h.color}"></div></div>
      <div class="week-dots">${dots}</div>
    </div>`;
  }).join('');
}

window.toggleHabit=async function(id){
  if(!currentUser)return;
  const h=habits.find(h=>h.id===id);
  if(!h)return;
  const today=new Date().toISOString().split('T')[0];
  const completed=h.completedDates||[];
  const isToday=completed.includes(today);
  let newCompleted,newStreak;
  if(isToday){
    newCompleted=completed.filter(d=>d!==today);
    newStreak=Math.max(0,(h.streak||0)-1);
  }else{
    newCompleted=[...completed,today];
    newStreak=calcStreak(newCompleted);
  }
  await updateDoc(doc(db,'habits',id),{completedDates:newCompleted,streak:newStreak,updatedAt:serverTimestamp()});
  h.completedDates=newCompleted;h.streak=newStreak;
  renderHabits();
  if(!isToday)showToast('🔥 ¡Hábito completado! +10 coins','s');
};

window.selectEmoji=function(e,el){selEmoji=e;document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');};
window.selectColor=function(c,el){selColor=c;document.querySelectorAll('.clr').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');};
window.openModal=function(){document.getElementById('habit-modal').classList.add('show');};
window.closeModal=function(){document.getElementById('habit-modal').classList.remove('show');};
document.getElementById('habit-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

window.saveHabit=async function(){
  const name=document.getElementById('h-name').value.trim();
  const time=document.getElementById('h-time').value;
  if(!name){showToast('⚠️ Escribe el nombre del hábito','e');return;}
  const ref=await addDoc(collection(db,'habits'),{uid:currentUser.uid,name,emoji:selEmoji,color:selColor,streak:0,completedDates:[],reminderTime:time||null,createdAt:serverTimestamp()});
  habits.push({id:ref.id,uid:currentUser.uid,name,emoji:selEmoji,color:selColor,streak:0,completedDates:[],reminderTime:time});
  if(time)scheduleDailyReminder(name,time);
  closeModal();
  document.getElementById('h-name').value='';
  renderHabits();
  showToast('🎯 ¡Hábito creado!','s');
};

function scheduleDailyReminder(name,time){
  if(!('Notification'in window))return;
  Notification.requestPermission().then(p=>{
    if(p!=='granted')return;
    const[h,m]=time.split(':').map(Number);
    const now=new Date();
    const target=new Date();
    target.setHours(h,m,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    const delay=target-now;
    setTimeout(()=>new Notification('⏰ Life Tracker',{body:`Es hora de: ${name}`}),delay);
  });
}

function showToast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=type==='s'?'#2EAF7D':type==='e'?'#E8547A':'#0D2137';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW activo:', reg.scope))
      .catch(() => {});
  });
}
</script>
</body>
</html>
